<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Driver Assistant - Live Control</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --success: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border-top: 4px solid var(--accent); }
        .full-width { grid-column: span 2; }
        .video-container { width: 100%; border-radius: 8px; overflow: hidden; background: #000; border: 2px solid #334155; }
        .status-item { font-size: 1.2rem; margin: 10px 0; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .status-item span { font-weight: bold; color: var(--accent); }
        .song { background: rgba(255,255,255,0.05); margin: 10px 0; padding: 12px; border-radius: 8px; border-left: 4px solid var(--success); }
        .btn-play { color: var(--success); text-decoration: none; font-weight: bold; font-size: 0.8rem; border: 1px solid var(--success); padding: 3px 7px; border-radius: 4px; }
        h1, h2 { margin-top: 0; color: var(--accent); }
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 20px;">
        <h1>🚗 AI Driver Monitoring System</h1>
    </div>

    <div class="dashboard">
        <div class="card full-width">
            <h2>👁️ AI Vision (Real-Time Inference)</h2>
            <div class="video-container">
                <img src="/video_feed" style="width: 100%; height: auto; display: block;">
            </div>
        </div>

        <div class="card">
            <h2>🎭 Detected States</h2>
            <div class="status-item">Visual (ResNet): <span id="cam-emotion">WAITING...</span></div>
            <div class="status-item">Voice (Gemini): <span id="voice-emotion">WAITING...</span></div>
        </div>

        <div class="card">
            <h2>🎵 Dynamic Playlist</h2>
            <div id="playlist"><p>Listening for driver feedback...</p></div>
        </div>
    </div>

    <script>
        async function updateData() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                document.getElementById('cam-emotion').innerText = data.camera.toUpperCase();
                document.getElementById('voice-emotion').innerText = data.voice.toUpperCase();
                
                let html = "";
                data.recommendations.forEach(s => {
                    html += `<div class="song"><b>${s.title}</b> - ${s.artist}<br>
                             ${s.url ? `<a href="${s.url}" target="_blank" class="btn-play">PLAY LINK</a>` : ''}</div>`;
                });
                if(html) document.getElementById('playlist').innerHTML = html;
            } catch (e) {}
        }
        setInterval(updateData, 1000);
    </script>
</body>
</html>
